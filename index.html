<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>CarPool — Share Rides With Your Community</title>
    <meta name="description" content="CarPool is a free community carpooling app. Post or join daily rides on any route, split costs with neighbours, and commute smarter together." />
    <meta name="keywords" content="carpool app, community carpool, share rides, daily commute, rideshare, office carpool, split fare, carpooling india" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="MuKq0pa4_or-9n3xgCK1PJ5gL1mUCu8jp1j0L9WuSzQ" />
    <link rel="canonical" href="https://carpool-virid.vercel.app/" />

    <!-- Open Graph (WhatsApp / Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://carpool-virid.vercel.app/" />
    <meta property="og:title" content="CarPool — Share Rides With Your Community" />
    <meta property="og:description" content="Free community carpooling app. Post or join daily rides on any route, split costs with neighbours, and commute smarter together." />
    <meta property="og:image" content="https://carpool-virid.vercel.app/apple-touch-icon.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CarPool — Share Rides With Your Community" />
    <meta name="twitter:description" content="Free community carpooling app. Post or join daily rides on any route, split costs with neighbours, and commute smarter together." />
    <meta name="twitter:image" content="https://carpool-virid.vercel.app/apple-touch-icon.png" />

    <!-- Structured data — helps AI assistants and search engines understand the app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CarPool",
      "url": "https://carpool-virid.vercel.app/",
      "description": "GC Carpool is a free community carpooling app that lets daily commuters post and join rides on any route. Split travel costs, reduce traffic, and commute smarter with neighbours.",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "featureList": [
        "Post rides on any route",
        "Join rides with one tap",
        "Group chat with co-riders",
        "Voice calls inside the app",
        "Recurring weekly ride schedules",
        "OTP-verified community",
        "Works offline as a PWA"
      ],
      "screenshot": "https://carpool-virid.vercel.app/apple-touch-icon.png"
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CarPool" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android / Windows tile colour -->
    <meta name="msapplication-TileColor" content="#1d4ed8" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
